{% extends "base.html" %}

{% block content %}
<div class="auth-center">
  <div class="auth-card fade-up">

    <div class="auth-top">
      <div class="auth-icon">✨</div>
      <h2>Reset your password</h2>
      <p>Create a new strong password</p>
    </div>

    <div class="auth-body">
      <form method="POST" action="/reset-password?token={{ token }}">

        <div class="field-group">
          <label class="field-label">New Password</label>
          <input type="password" name="password" class="field-input" placeholder="Min. 6 characters" required
            autocomplete="new-password">
        </div>

        <div class="field-group" style="margin-bottom:1.5rem;">
          <label class="field-label">Confirm Password</label>
          <input type="password" name="confirm_password" class="field-input" placeholder="Confirm your password" required
            autocomplete="new-password">
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg">
          Reset Password →
        </button>
      </form>

      <p style="text-align:center; font-size:0.85rem; color:var(--text-muted); margin-top:1.5rem;">
        <a href="{{ url_for('forgot_password') }}" style="color:var(--honey); font-weight:600;">
          Request a new reset link →
        </a>
      </p>

    </div>

  </div>
</div>

<script>
  // Password strength indicator
  const passwordInput = document.querySelector('input[name="password"]');
  const confirmInput = document.querySelector('input[name="confirm_password"]');
  
  confirmInput.addEventListener('input', function() {
    if (passwordInput.value && confirmInput.value !== passwordInput.value) {
      confirmInput.style.borderColor = '#e74c3c';
    } else if (confirmInput.value) {
      confirmInput.style.borderColor = '#2ecc71';
    } else {
      confirmInput.style.borderColor = '';
    }
  });
</script>
{% endblock %}
