{% extends "base.html" %}

{% block content %}
<div class="auth-center">
  <div class="auth-card fade-up">

    <div class="auth-top">
      <div class="auth-icon">🔑</div>
      <h2>Forgot your password?</h2>
      <p>Enter your email and we'll send you a reset link</p>
    </div>

    <div class="auth-body">

      <div class="field-group">
        <label class="field-label">Email Address</label>
        <input type="email" id="reset-email" class="field-input" placeholder="you@example.com"
          autocomplete="email">
      </div>

      <button id="reset-btn" type="button" class="btn btn-primary btn-full btn-lg">
        Send Reset Link →
      </button>

      <div id="reset-msg" style="display:none; text-align:center; margin-top:1rem; font-size:0.9rem;"></div>

      <p style="text-align:center; font-size:0.85rem; color:var(--text-muted); margin-top:1.5rem;">
        Remember your password?
        <a href="{{ url_for('login') }}" style="color:var(--honey); font-weight:600; margin-left:4px;">
          Back to login →
        </a>
      </p>

    </div>

  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script>
  firebase.initializeApp({
    apiKey:     "{{ firebase_api_key }}",
    authDomain: "{{ firebase_auth_domain }}",
    projectId:  "{{ firebase_project_id }}",
  });

  document.getElementById('reset-btn').onclick = function () {
    const email = document.getElementById('reset-email').value.trim();
    const msgEl = document.getElementById('reset-msg');

    if (!email) {
      msgEl.style.display = 'block';
      msgEl.style.color   = '#e74c3c';
      msgEl.textContent   = 'Please enter your email address.';
      return;
    }

    this.disabled    = true;
    this.textContent = 'Sending...';

    firebase.auth().sendPasswordResetEmail(email)
      .then(() => {
        msgEl.style.display = 'block';
        msgEl.style.color   = '#2ecc71';
        msgEl.textContent   = '✅ Reset link sent! Check your inbox (and spam folder).';
        document.getElementById('reset-btn').textContent = 'Sent!';
      })
      .catch((error) => {
        msgEl.style.display = 'block';
        msgEl.style.color   = '#e74c3c';

        if (error.code === 'auth/user-not-found') {
          // Show same message for security — don't reveal if email exists
          msgEl.style.color = '#2ecc71';
          msgEl.textContent = '✅ Reset link sent! Check your inbox (and spam folder).';
          document.getElementById('reset-btn').textContent = 'Sent!';
        } else {
          msgEl.textContent = 'Something went wrong. Please try again.';
          document.getElementById('reset-btn').disabled    = false;
          document.getElementById('reset-btn').textContent = 'Send Reset Link →';
        }
      });
  };
</script>
{% endblock %}
