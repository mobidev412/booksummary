{% extends "base.html" %}

{% block content %}
<div class="auth-center">
  <div class="auth-card fade-up">

    <div class="auth-top">
      <div class="auth-icon">📚</div>
      <h2>Welcome back</h2>
      <p>Pour a cup and continue your reading journey</p>
    </div>

    <div class="auth-body">
      <form method="POST" action="/login">

        <div class="field-group">
          <label class="field-label">Email Address</label>
          <input type="email" name="email" class="field-input" placeholder="you@example.com" required
            autocomplete="email">
        </div>

        <div class="field-group" style="margin-bottom:1.5rem;">
          <label class="field-label">Password</label>
          <input type="password" name="password" class="field-input" placeholder="Your password" required
            autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg">
          Continue Reading →
        </button>
      </form>

      <div style="text-align:right; margin-top:0.5rem;">
        <a href="{{ url_for('forgot_password') }}" style="font-size:0.95em; color:var(--honey); font-weight:600;">Forgot
          password?</a>
      </div>

      <div class="or-divider" style="margin:1.5rem 0;">or</div>

      <!-- Google Sign-In Button -->
      <button id="google-login-btn" type="button" class="btn btn-google btn-full btn-lg" style="margin-bottom:1rem;">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
          style="height:20px;vertical-align:middle;margin-right:8px;"> Sign in with Google
      </button>

      <p style="text-align:center; font-size:0.85rem; color:var(--text-muted);">
        No account yet?
        <a href="{{ url_for('register') }}" style="color:var(--honey); font-weight:600; margin-left:4px;">
          Create one free →
        </a>
      </p>

      <div style="display:flex; justify-content:center; gap:10px; margin-top:1.75rem; flex-wrap:wrap;">
        <span class="badge badge-caramel">📖 AI-Powered Summaries</span>
        <span class="badge badge-rain">⚡ Instant Key Points</span>
      </div>
    </div>

  </div>
</div>

<!-- Firebase App (the core Firebase SDK) -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script>
  // Your web app's Firebase configuration
  const firebaseConfig = {
    apiKey: "{{ firebase_api_key }}",
    authDomain: "{{ firebase_auth_domain }}",
    projectId: "{{ firebase_project_id }}",
  };
  firebase.initializeApp(firebaseConfig);

  document.getElementById('google-login-btn').onclick = function () {
    const provider = new firebase.auth.GoogleAuthProvider();
    firebase.auth().signInWithPopup(provider)
      .then(function (result) {
        const user = result.user;
        user.getIdToken().then(function (idToken) {
          fetch("/auth/google", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              name: user.displayName,
              email: user.email,
              google_uid: user.uid
            })
          })
            .then(res => res.json())
            .then(data => {
              if (data.redirect) {
                window.location.href = data.redirect;
              } else if (data.error) {
                alert(data.error);
              }
            });
        });
      })
      .catch(function (error) {
        alert(error.message || "Google sign-in failed");
      });
  };
</script>
{% endblock %}
